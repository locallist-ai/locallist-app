name: CI & Security Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-security:
    name: Build & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Puedes cambiarlo a la versión que uses (18, 20, etc.)
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Security Audit
        run: npm audit --audit-level=high

      - name: Build Project
        run: npm run build
