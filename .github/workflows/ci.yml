name: CI & Security Checks

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-security:
    name: Build & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Security Audit
        run: npm audit --audit-level=high

      - name: Type Check
        run: npx tsc --noEmit

      # Gate: falla el build ante errores de lint (los warnings se loguean).
      - name: Lint
        run: npx expo lint

      # Gate de cobertura (coverageThreshold en package.json): suelo
      # anti-regresión bajo el ~78% líneas actual, no un objetivo.
      - name: Run Tests
        run: npm test -- --coverage --passWithNoTests
